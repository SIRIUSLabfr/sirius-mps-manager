<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIRIUS MPS Manager</title>
    <meta name="description" content="SIRIUS MPS Manager - Managed Print Services Dashboard" />
  </head>
  <body>
    <script>
      // SOFORT deal_id aus URL sichern, BEVOR React Router startet
      (function() {
        var params = new URLSearchParams(window.location.search);
        var dealId = params.get('deal_id') || params.get('dealId') || params.get('entityId');
        if (dealId) {
          sessionStorage.setItem('zoho_deal_id', dealId);
          console.log('[MPS] deal_id gesichert:', dealId);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
