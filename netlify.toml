[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Chromium binary (@sparticuz/chromium) darf nicht von esbuild gebundlet
# werden — sonst geht der Native-Layer kaputt. Der render-pdf-Handler
# bekommt extra Timeout, weil Headless-Chromium Cold-Start braucht.
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@sparticuz/chromium", "puppeteer-core"]

[functions."render-pdf"]
  included_files = ["node_modules/@sparticuz/chromium/**"]
  timeout = 30

[[redirects]]
  from = "/auth/callback"
  to = "/.netlify/functions/zoho-callback"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
